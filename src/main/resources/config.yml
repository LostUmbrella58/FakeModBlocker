# You can create more language files to use, or just change messages_en.yml directly
language: en

# Whether to activate mod detection
enable: true

# Whether to print logs to console
# Enabling this will show every mod and plugin messages (yes, it actually shows some plugin messages and player mod channeling messages) between your players and your server in console
# Notice: This would be helpful to show all mods that a server can get so that you can easily add more forbidden mods if you want.
logger: true

# Use custom kick command instead of default kick player
useCustomKickCommand: true

# Custom kick command if enabled (supports %player% and %kickMessage%)
command: "kick %player% %kickMessage%"

# Keywords to identify forbidden mods from plugin message channels
# And it's better to add ""
forbiddenList:
  - "fabric"
  - "forge"
  - "xaeroworldmap"
  - "xaerominimap"
  - "worldinfo"
  - "tweakeroo"
  - "creativecore"
  - "minimapsync"
  # Use specific Servux sub-channels so that "servux:litematics" (Litematica) is not caught.
  # Tweakeroo registers "servux:tweaks", MiniHUD/Structures registers "servux:structures".
  - "servux:tweaks"
  - "servux:structures"
  - "axiom"
  - "freecam"
  - "flashback"
  - "voxelmap"
  - "replay"

notifyStaff: true
notificationPermission: fakemodblocker.notify

# Extra optional detections
# WARNING:
# This sign translation detection depends on sign editor API availability.
# On some older server versions/APIs it is NOT available and will be skipped automatically.
extra-detections:
  # Optional: use PacketEvents (https://www.spigotmc.org/resources/packetevents-api.80279/)
  # to intercept plugin-channel registration packets directly. This catches forbidden
  # channels earlier (no PlayerJoinEvent + 15 tick delay) and is more reliable when mods
  # register channels late in the session. Only takes effect if PacketEvents is installed.
  packet-events:
    enabled: true
  sign-translation:
    enabled: true
    skip-bedrock-via-floodgate: true
    mods:
      Freecam:
        detect:
          key: "key.freecam.toggle"
        punishment:
          action: "KICK"
          reason: "&c&lWarning: Please do not use &b&lFreecam &c&lon this server."

      AccurateBlockPlacement:
        detect:
          key: "key.category.accurateblockplacement.category"
        punishment:
          action: "KICK"
          reason: "&c&lWarning: Please do not use &b&lAccurateBlockPlacement &c&lon this server."